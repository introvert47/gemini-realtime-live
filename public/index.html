<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workspace Companion</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #1e1e2e; /* Catppuccin Mocha Base */
            color: #cdd6f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .workspace-layout {
            display: flex;
            gap: 20px;
            max-width: 900px;
            width: 100%;
            background-color: #181825;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        /* Compact Camera Card */
        .camera-card {
            width: 240px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-wrapper {
            position: relative;
            width: 240px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #45475a;
            background-color: #11111b;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Normal mirror view */
        }

        /* Status Indicator Indicator */
        .status-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(17, 17, 27, 0.75);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #a6e3a1; /* Active Green */
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(166, 227, 161, 0.7);
            animation: pulse 1.6s infinite;
        }

        .pulse-dot.thinking {
            background-color: #f9e2af; /* Yellow when processing */
            box-shadow: 0 0 0 0 rgba(249, 226, 175, 0.7);
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(166, 227, 161, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(166, 227, 161, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(166, 227, 161, 0); }
        }

        /* Interactive Panel */
        .interaction-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
        }

        .input-bar {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #45475a;
            background-color: #313244;
            color: #cdd6f4;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: #cba6f7;
        }

        button {
            padding: 12px 20px;
            background-color: #cba6f7;
            color: #11111b;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover { background-color: #b4befe; }
        button:disabled { background-color: #585b70; cursor: not-allowed; }

        .chat-display {
            flex: 1;
            background-color: #11111b;
            border-radius: 10px;
            padding: 15px;
            min-height: 130px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .chat-display span {
            font-size: 12px;
            color: #a6adc8;
            text-transform: uppercase;
            font-weight: bold;
        }

        .chat-display p {
            margin: 0;
            font-size: 15px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="workspace-layout">
        <div class="camera-card">
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline></video>
                <div class="status-badge">
                    <div id="statusDot" class="pulse-dot"></div>
                    <span id="statusText">AI WATCHING</span>
                </div>
            </div>
        </div>

        <div class="interaction-panel">
            <div class="chat-display">
                <span>Gemini Response</span>
                <p id="responseText">Ready. Ask a question or click to snap a frame.</p>
            </div>
            
            <div class="input-bar">
                <input type="text" id="promptInput" value="What is this? Explain it briefly.">
                <button id="askBtn">Send Frame</button>
            </div>
        </div>
    </div>

    <canvas id="captureCanvas" style="display:none;" width="640" height="480"></canvas>

    <script src="script.js"></script>
</body>
</html>
